name: Build and deploy .NET Core application to Web App projecttestapp
on:
  push:
    branches:
    - main
permissions:
  id-token: write
  contents: read
env:
  AZURE_WEBAPP_NAME: projecttestapp
  AZURE_WEBAPP_PACKAGE_PATH: TestApp\published
  CONFIGURATION: Release
  DOTNET_CORE_VERSION: 10.0.x
  WORKING_DIRECTORY: TestApp
  AZURE_RESOURCE_GROUP: projecttestapp_group
  AZURE_SLOT_NAME: staging
jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_CORE_VERSION }}
    - name: Restore
      run: dotnet restore "${{ env.WORKING_DIRECTORY }}"
    - name: Build
      run: dotnet build "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-restore
    - name: Test
      run: dotnet test "${{ env.WORKING_DIRECTORY }}" --no-build
    - name: Publish
      run: dotnet publish "${{ env.WORKING_DIRECTORY }}" --configuration ${{ env.CONFIGURATION }} --no-build --output "${{ env.AZURE_WEBAPP_PACKAGE_PATH }}"
    - name: Publish Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
  deploy:
    runs-on: ubuntu-latest
    needs: build
    #
    steps:
    - name: Download artifact from build job
      uses: actions/download-artifact@v4
      with:
        name: webapp
        path: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    - name: Azure Login
      uses: azure/login@v2
      with:
        client-id: ${{ vars.projecttestapp_CLIENT_ID_8A1A }}
        tenant-id: ${{ vars.projecttestapp_TENANT_ID_8A1A }}
        subscription-id: ${{ vars.projecttestapp_SUBSCRIPTION_ID_8A1A }}
    - name: Deploy to Azure WebApp (staging slot)
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        slot-name: ${{ env.AZURE_SLOT_NAME }}
        package: ${{ env.AZURE_WEBAPP_PACKAGE_PATH }}
    - name: Health check staging slot
      run: |
        curl -f https://projecttestapp-staging-c8d4c4hxechjfxh8.canadacentral-01.azurewebsites.net/health || exit 1
        
    - name: swap staging slot to production
      uses: azure/cli@v2
      with:
        inlineScript:  |
          az webapp deployment slot swap \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --slot ${{ env.AZURE_SLOT_NAME }} \
            --target-slot production
